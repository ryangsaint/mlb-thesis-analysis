<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cluster Pay vs WAR Matrix</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", Arial, sans-serif;
      background: #ffffff;
      color: #1e293b;
      padding: 28px 32px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }

    .legend-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .cluster-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab-btn {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      color: #64748b;
      cursor: pointer;
      transition: all 0.15s;
      font-family: "Inter", Arial, sans-serif;
    }

    .tab-btn:hover { border-color: #cbd5e1; color: #1e293b; }

    .tab-btn.active {
      border-color: transparent;
      font-weight: 600;
    }

    .cluster-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .cluster-name-tag {
      font-size: 13px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
    }

    .cluster-teams-tag {
      font-size: 12px;
      color: #64748b;
    }

    .matrix-container {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .matrix-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .matrix-table thead tr {
      background: #1e3a5f;
    }

    .matrix-table th {
      font-size: 11px;
      font-weight: 600;
      color: #ffffff;
      text-align: left;
      padding: 10px 14px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .matrix-table th.num { text-align: right; }

    .matrix-table td {
      padding: 9px 14px;
      border-bottom: 1px solid #f1f5f9;
      color: #1e293b;
      font-size: 13px;
    }

    .matrix-table td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .matrix-table tbody tr:last-child td { border-bottom: none; }

    .matrix-table tbody tr:hover td {
      background-color: #f0f7ff !important;
    }

    .pos-label { font-weight: 500; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .badge-over  { background: #FCEBEB; color: #A32D2D; }
    .badge-value { background: #EAF3DE; color: #3B6D11; }
    .badge-even  { background: #F1EFE8; color: #5F5E5A; }

    .delta-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
    }

    .delta-val {
      font-size: 11px;
      color: #94a3b8;
      min-width: 38px;
    }

    .delta-bar {
      height: 6px;
      border-radius: 2px;
      min-width: 2px;
      flex-shrink: 0;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>

  <div class="page-title">Positional Pay vs WAR by Cluster</div>
  <div class="page-subtitle">
    Average payroll share vs WAR share per position group — delta indicates over or underpay
  </div>

  <div class="legend-row">
    <div class="legend-item">
      <div class="legend-swatch" style="background:#F09595;"></div>
      Overpay — pay % exceeds WAR %
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#97C459;"></div>
      Value — WAR % exceeds pay %
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#D3D1C7;"></div>
      Even — within 0.3%
    </div>
  </div>

  <div class="cluster-tabs" id="tabs"></div>
  <div class="cluster-header" id="cluster-header"></div>
  <div class="matrix-container">
    <div id="matrix-body"></div>
  </div>

  <script>
    const clusters = [{id:0, label:"Cluster 1", name:"Rotation Horses, DH-heavy", teams:"BAL · BOS · DET · MIN · NYY · SEA · TEX · TOR · WSH",
     color:"#0451b4", textColor:"#E8E8E8",
     rows:[
      ["Starting Pitchers", 31.4, 25.3],
      ["Designated Hitters", 8.5, 2.8],
      ["First Basemen", 6.3, 4.9],
      ["Utility", 4.1, 3.6],
      ["Relief Pitchers", 15.2, 15.2],
      ["Left Fielders", 3.6, 4.3],
      ["Shortstops", 6.7, 7.6],
      ["Catchers", 4.4, 5.3],
      ["Second Basemen", 5.1, 7],
      ["Third Basemen", 5.4, 7.8],
      ["Right Fielders", 5.1, 8.1],
      ["Center Fielders", 4.2, 8.1]
    ]},
  {id:1, label:"Cluster 2", name:"Sporadic Offensive Spending", teams:"COL · LAA",
     color:"#34d399", textColor:"#262626",
     rows:[
      ["Left Fielders", 6.9, 0.6],
      ["Relief Pitchers", 16.6, 10.4],
      ["Right Fielders", 9.6, 3.7],
      ["First Basemen", 6.6, 2.8],
      ["Utility", 4.3, 3],
      ["Designated Hitters", 5.2, 4.3],
      ["Third Basemen", 11.9, 12.7],
      ["Catchers", 2.9, 4.4],
      ["Second Basemen", 2.4, 4.7],
      ["Center Fielders", 11, 13.6],
      ["Shortstops", 6, 14],
      ["Starting Pitchers", 16.6, 25.9]
    ]},
  {id:2, label:"Cluster 3", name:"Balanced Lineups, Bullpen Emphasis", teams:"ARI · CHC · CLE · HOU · LAD · MIA · MIL · NYM · OAK · SD · TB",
     color:"#f5cf27", textColor:"#262626",
     rows:[
      ["Relief Pitchers", 20.1, 13.6],
      ["Left Fielders", 7.4, 5.5],
      ["Designated Hitters", 3.4, 1.9],
      ["Utility", 6.3, 5.2],
      ["Right Fielders", 6.7, 6.4],
      ["Catchers", 4.8, 5.1],
      ["Third Basemen", 7, 7.9],
      ["First Basemen", 5.6, 6.5],
      ["Center Fielders", 4.1, 5.7],
      ["Starting Pitchers", 25.2, 27],
      ["Second Basemen", 5.2, 7.2],
      ["Shortstops", 4.4, 7.7]
    ]},
  {id:3, label:"Cluster 4", name:"Relief-dependent outlier", teams:"PIT",
     color:"#ff73cc", textColor:"#262626",
     rows:[
      ["Third Basemen", 8, -17.2],
      ["Catchers", 7.2, -5.4],
      ["Starting Pitchers", 19.8, 10.2],
      ["Designated Hitters", 2.4, -6.4],
      ["Second Basemen", 4.7, -3.5],
      ["Left Fielders", 5.7, 3.4],
      ["Shortstops", 3.1, 1.7],
      ["Right Fielders", 6.2, 11.1],
      ["First Basemen", 3.4, 10.2],
      ["Utility", 7.1, 15.2],
      ["Relief Pitchers", 23.5, 46.5],
      ["Center Fielders", 8.8, 34]
    ]},
  {id:4, label:"Cluster 5", name:"Up the Middle Value Finders", teams:"ATL · CHW · CIN · KC · PHI · SF · STL",
     color:"#fa0202", textColor:"#e8e8e8",
     rows:[
      ["First Basemen", 11.1, 8.4],
      ["Relief Pitchers", 18.4, 15.9],
      ["Left Fielders", 6, 3.9],
      ["Right Fielders", 5.7, 3.7],
      ["Utility", 3.9, 2.6],
      ["Catchers", 8.7, 7.5],
      ["Designated Hitters", 2.7, 1.6],
      ["Third Basemen", 5.2, 6.3],
      ["Shortstops", 4, 6.6],
      ["Second Basemen", 3.5, 6.1],
      ["Starting Pitchers", 28.1, 30.9],
      ["Center Fielders", 2.9, 6.6]
    ]}];

    let active = 0;

    function badge(delta) {
      if (Math.abs(delta) < 0.3) return '<span class="badge badge-even">even</span>';
      if (delta > 0) return '<span class="badge badge-over">overpay</span>';
      return '<span class="badge badge-value">value</span>';
    }

    function deltaBar(delta) {
      const abs = Math.abs(delta);
      const maxDelta = 26;
      const w = Math.min(Math.round((abs / maxDelta) * 60), 60);
      const color = Math.abs(delta) < 0.3 ? "#B4B2A9" : delta > 0 ? "#E24B4A" : "#639922";
      const dir = delta >= 0 ? "row" : "row-reverse";
      const align = delta >= 0 ? "left" : "right";
      const sign = delta > 0 ? "+" : "";
      return `<div class="delta-bar-wrap" style="flex-direction:${dir}">
        <span class="delta-val" style="text-align:${align}">${sign}${delta.toFixed(1)}</span>
        <div class="delta-bar" style="width:${w}px;background:${color};"></div>
      </div>`;
    }

    function render() {
      const c = clusters[active];

      document.getElementById("tabs").innerHTML = clusters.map(cl =>
        `<button class="tab-btn${cl.id === active ? " active" : ""}"
          style="${cl.id === active ? `background:${cl.color};color:${cl.textColor};` : ""}"
          onclick="setActive(${cl.id})">${cl.label}</button>`
      ).join("");

      document.getElementById("cluster-header").innerHTML =
        `<span class="cluster-name-tag"
           style="background:${c.color};color:${c.textColor};">${c.name}</span>
         <span class="cluster-teams-tag">${c.teams}</span>`;

      const rows = c.rows.map(([pos, pay, war]) => {
        const delta = parseFloat((pay - war).toFixed(1));
        const rowBg = Math.abs(delta) < 0.3
          ? "background:transparent"
          : delta > 0
            ? "background:rgba(226,75,74,0.04)"
            : "background:rgba(99,153,34,0.04)";
        return `<tr style="${rowBg}">
          <td class="pos-label">${pos}</td>
          <td class="num">${parseFloat(pay).toFixed(1)}%</td>
          <td class="num">${parseFloat(war).toFixed(1)}%</td>
          <td class="num">${deltaBar(delta)}</td>
          <td class="num">${badge(delta)}</td>
        </tr>`;
      }).join("");

      document.getElementById("matrix-body").innerHTML =
        `<table class="matrix-table">
          <thead><tr>
            <th>Position</th>
            <th class="num">Pay %</th>
            <th class="num">WAR %</th>
            <th class="num" style="min-width:130px;">Delta</th>
            <th class="num">Rating</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function setActive(id) { active = id; render(); }
    render();
  </script>

</body>
</html>
